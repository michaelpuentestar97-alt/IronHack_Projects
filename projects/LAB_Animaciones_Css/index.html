<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animaciones Html | Css</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Animaciones Html | Css</h1>

      <div class="elements">
        <!-- CUADRADO -->
        <div class="container_cuadrado">
          <h3>Animación Cuadrado</h3>
          <div class="cuadrado"></div>
        </div>

        <!-- PELOTA -->
        <div class="container_pelota">
          <h3 class="titulo_pelota">Animación Pelota</h3>
          <div class="area">
            <div class="pelota"></div>
            <div class="piso"></div>
          </div>
        </div>
      </div>

      <h3>Animación Anuncio</h3>
      <div class="anuncio">
        <div class="logo">Concesionario PACO</div>
        <div class="slogan">¡Nos los quitan de las manos!</div>

        <img src="img/carro.png" alt="Coche" class="coche" />
      </div>
    </div>
  </body>
</html>
